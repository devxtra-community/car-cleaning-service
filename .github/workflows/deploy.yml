# CD - Deploy to EC2 (Verified for ec2-user)
name: CD - Deploy to EC2

on:
  push:
    branches: ["main", "yasir"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m

          script: |
            set -e
            cd /var/www/car-cleaning/car-cleaning-service
            git fetch origin yasir
            git reset --hard origin/yasir

            # Use npx pnpm to avoid PATH issues
            npx pnpm install

            cd backend
            npx pnpm run build

            # Pass production env vars (assuming they are in .env or system)
            # Restart or reload using pm2
            if pm2 describe car-cleaning-api > /dev/null; then
              pm2 reload car-cleaning-api
            else
              pm2 start dist/index.js --name car-cleaning-api
            fi
            
            # Diagnostic: Check if something is listening on 3033
            sudo netstat -tuln | grep 3033 || echo "Nothing listening on 3033"
            
            # Diagnostic: Check PM2 status and logs
            pm2 status
            pm2 logs car-cleaning-api --lines 20 --no-daemon & sleep 5 && kill $!
