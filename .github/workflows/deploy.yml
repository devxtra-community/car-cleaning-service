# CD - Deploy to EC2 (Verified for ec2-user)
name: CD - Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e
            cd /var/www/car-cleaning/car-cleaning-service
            git pull origin yasir

            # Install pnpm if missing
            if ! command -v pnpm &> /dev/null; then
              npm install -g pnpm
            fi

            # Install dependencies via pnpm (scales better)
            pnpm install

            cd backend
            pnpm run build

            # Pass production env vars (assuming they are in .env or system)
            # Restart or reload using pm2
            if pm2 describe car-cleaning-api > /dev/null; then
              pm2 reload car-cleaning-api
            else
              pm2 start dist/index.js --name car-cleaning-api
            fi
            
            pm2 save
