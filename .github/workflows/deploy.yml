name: CD - Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e
            cd /var/www/car-cleaning/car-cleaning-service
            git pull origin main

            # Install root dependencies (for workspaces)
            npm install

            cd backend
            npm install
            npm run build

            # Check if process exists to decide between start or reload
            if pm2 describe car-cleaning-api > /dev/null; then
              pm2 reload car-cleaning-api
            else
              pm2 start dist/index.js --name car-cleaning-api
            fi
            
            pm2 save
