server {
    listen 80;
    server_name _; # Replace with 3.80.46.40 or your domain name later

    root /var/www/carwash;
    index index.html;

    # Frontend Static Files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    # This block handles all major backend route prefixes
    location ~ ^/(api|s3|workers|tasks|penalties|analytics|feedback|supervisors|fraud|uploads) {
        proxy_pass http://localhost:3033; # Default port in code
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Increase upload limit for S3/images
        client_max_body_size 50M;
    }

    # Optional: Handle /assets/ specifically for performance
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
